<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

            font-family: 'Google Sans', sans-serif;

</head>
<body>
    <div class="text-center">
    <h1>Switch Statement</h1>

    <button class="btn btn-danger" onClick="teamRank()">Rank</button>

    </div>

    <script>

        function teamRank(){
            var rank = "1st";

            message = "";

            switch (true) {
                case (rank === "1st") :
                    message = "WEEEEEE ARE THE CHAMPIOOONS MY FRIEEENND";
                    break;
                case (rank === "2nd") :
                    message = "2nd Placer!";
                    break;
                case (rank === "3rd") :
                    message = "3rd Placer!";
                    break;
                case (rank === "4th") :
                    message = "better luck next year dawg";
                    break;
                default:
                    message = "Rank could not be determined.";
            }
                alert(message)
        }

        var team = "Red Bulldogs";

        switch (team){
            case "Red Bulldogs" :
                alert("OOOOHHH ITS COLD IN HERE!");
                break;
            case "Green Hornets" :
                alert("GO GO GO FIGHT FIGHT FIGHT WIN!");
                break;
            case "Blue Bears" :
                alert("she gon call me baby boo");
                break;
            case "Yellow" :
                alert("go tigers! go tigers! go tigers! go go go go go tigers!");
                break;
            default:
                alert("Team could not be determined.");
        }
    </script>
</body>
